name: Tests

on:
  push:
    branches:
      - main
      - ci/**
  pull_request:
    branches:
      - main

jobs:
  test-on-msvc:
    strategy:
      fail-fast: false

      matrix:
        toolset: [142, 143]
        cppstd: ['17', '20', '23']
        build-type: [Debug, Release]
        exclude:
          - toolset: 142
            cppstd: '23'
        include:
          - toolset: 142
            conan-compiler-version: 192
          - toolset: 143
            conan-compiler-version: 194
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: MSVC ${{ matrix.toolset }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}

    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        uses: turtlebrowser/get-conan@main

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install dependencies
        run: >
          conan install .
          -c tools.microsoft.msbuild:vs_version=17
          -s compiler.version=${{ matrix.conan-compiler-version }}
          -s compiler.cppstd=${{ matrix.cppstd }}
          -s build_type=${{ matrix.build-type }}
          -b missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset conan-default

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}

  test-on-gcc:
    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        cppstd: ['17', '20', '23']
        build-type: [Debug, Release]
        include:
          - os: ubuntu-22.04
            gcc-version: 11
          - os: ubuntu-24.04
            gcc-version: 13
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: GCC ${{ matrix.gcc-version }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Check GCC Version
        shell: bash
        run: |
          gcc -dumpversion
          (( $(gcc -dumpversion | cut -d. -f1) == ${{ matrix.gcc-version }} ))

      - name: Install Conan
        uses: turtlebrowser/get-conan@main

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install dependencies
        run: >
          conan install .
          -s compiler.cppstd=${{ matrix.cppstd }}
          -s build_type=${{ matrix.build-type }}
          -b missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}

  test-on-old-gcc:
    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-22.04]
        gcc-version: [9]
        cppstd: ['17', '20']
        build-type: [Debug, Release]
        include:
          - build-type: Debug
            cmake-preset: conan-debug
          - build-type: Release
            cmake-preset: conan-release

    name: GCC ${{ matrix.gcc-version }} - C++${{ matrix.cppstd }} - ${{ matrix.build-type }}

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup GCC
        uses: egor-tensin/setup-gcc@v1
        with:
          version: ${{ matrix.gcc-version }}

      - name: Check GCC Version
        shell: bash
        run: |
          gcc -dumpversion
          (( $(gcc -dumpversion | cut -d. -f1) == ${{ matrix.gcc-version }} ))

      - name: Install Conan
        uses: turtlebrowser/get-conan@main

      - name: Setup Conan
        run: |
          conan --version
          conan profile detect

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Install dependencies
        run: >
          conan install .
          -s compiler.cppstd=${{ matrix.cppstd }}
          -s build_type=${{ matrix.build-type }}
          -b missing

      - name: CMake Configure
        run: |
          cmake --list-presets
          cmake --preset ${{ matrix.cmake-preset }}

      - name: Build
        run: |
          cmake --build --list-presets
          cmake --build --preset ${{ matrix.cmake-preset }}

      - name: Test
        run: |
          ctest --list-presets
          ctest --preset ${{ matrix.cmake-preset }}
